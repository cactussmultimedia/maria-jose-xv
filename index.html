<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>María José · XV Años</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --dorado: #c9a84c;
    --dorado-claro: #e8d5a3;
    --gris-suave: #8a7f7a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: #faf5f0;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(242,196,206,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.10) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  header {
    position: relative; z-index: 1;
    text-align: center; padding: 3rem 1rem 1rem;
  }
  .eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem; letter-spacing: 0.35em;
    color: var(--dorado); text-transform: uppercase; margin-bottom: 0.5rem;
    opacity: 0; animation: fadeUp 1s ease forwards 0.3s;
  }
  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3.5rem, 10vw, 6rem);
    color: #3a2a2a; line-height: 1;
    opacity: 0; animation: fadeUp 1.2s ease forwards 0.6s;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--gris-suave); letter-spacing: 0.15em; margin-top: 0.4rem;
    opacity: 0; animation: fadeUp 1s ease forwards 0.9s;
  }
  .divider {
    display: flex; align-items: center; justify-content: center;
    gap: 1rem; margin: 1.2rem auto 0;
    opacity: 0; animation: fadeUp 1s ease forwards 1.1s;
  }
  .divider span { display: block; height: 1px; width: 80px; background: linear-gradient(to right, transparent, var(--dorado)); }
  .divider span:last-child { background: linear-gradient(to left, transparent, var(--dorado)); }
  .divider-diamond { color: var(--dorado); font-size: 0.6rem; }

  .clock-section {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem 4rem; min-height: 90vmin;
  }
  .clock-wrap {
    position: relative;
    width: min(90vmin, 620px); height: min(90vmin, 620px);
  }
  .clock-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.25);
    animation: rotateSlow 60s linear infinite;
  }
  .clock-ring::before {
    content: ''; position: absolute; inset: 8px; border-radius: 50%;
    border: 1px dashed rgba(201,168,76,0.15);
  }
  .center-photo {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 42%; height: 42%;
    border-radius: 50%; overflow: hidden;
    border: 3px solid var(--dorado-claro);
    box-shadow: 0 0 0 6px rgba(242,196,206,0.3), 0 0 0 12px rgba(201,168,76,0.08), 0 8px 40px rgba(0,0,0,0.15);
    opacity: 0; animation: fadeIn 1.5s ease forwards 1.4s;
  }
  .center-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .center-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% + 24%));
    width: 50%; text-align: center;
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1rem, 3vmin, 1.4rem);
    color: var(--dorado); text-shadow: 0 1px 8px rgba(255,255,255,0.9);
    pointer-events: none; opacity: 0; animation: fadeIn 1s ease forwards 2s;
  }
  .thumb {
    position: absolute;
    width: clamp(60px, 10vmin, 82px); height: clamp(60px, 10vmin, 82px);
    border-radius: 6px; overflow: hidden; cursor: pointer;
    border: 2px solid var(--dorado-claro);
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s, border-color 0.3s;
    opacity: 0;
  }
  .thumb:hover {
    transform: translate(-50%,-50%) scale(1.18) !important;
    box-shadow: 0 8px 28px rgba(201,168,76,0.35);
    border-color: var(--dorado); z-index: 10;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .thumb-badge {
    position: absolute; bottom: 3px; right: 4px;
    font-family: 'Montserrat', sans-serif; font-size: 0.52rem;
    color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.38);
    padding: 1px 4px; border-radius: 3px;
  }
  .thumb-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 0.58rem; color: rgba(255,255,255,0.9);
    text-align: center; padding: 8px 2px 3px; line-height: 1.1;
  }

  /* lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(15,8,8,0.93); backdrop-filter: blur(8px);
    align-items: center; justify-content: center; flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lb-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
  }
  .lb-title { font-family: 'Great Vibes', cursive; font-size: clamp(1.4rem,4vw,2rem); color: var(--dorado-claro); }
  .lb-counter { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.45); }
  .lb-close {
    background: none; border: 1px solid rgba(255,255,255,0.2); color: white;
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.1); }
  .lb-stage {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 5rem 4rem;
  }
  .lb-img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    border-radius: 3px; box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    opacity: 0; transition: opacity 0.25s ease;
  }
  .lb-img.loaded { opacity: 1; }
  .lb-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: 1px solid rgba(255,255,255,0.2); color: white;
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 10;
  }
  .lb-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--dorado); color: var(--dorado-claro); }
  .lb-prev { left: 0.8rem; }
  .lb-next { right: 0.8rem; }
  .lb-strip {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0.7rem 1rem;
    display: flex; gap: 5px; overflow-x: auto; justify-content: center;
    background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    scrollbar-width: none;
  }
  .lb-strip::-webkit-scrollbar { display: none; }
  .strip-thumb {
    flex-shrink: 0; width: 50px; height: 38px; border-radius: 3px;
    overflow: hidden; cursor: pointer;
    border: 1.5px solid transparent; opacity: 0.5;
    transition: opacity 0.2s, border-color 0.2s;
  }
  .strip-thumb.active, .strip-thumb:hover { opacity: 1; border-color: var(--dorado); }
  .strip-thumb img { width: 100%; height: 100%; object-fit: cover; }

  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 1rem 1rem 3rem;
  }
  footer p {
    font-family: 'Montserrat', sans-serif; font-size: 0.58rem;
    letter-spacing: 0.25em; color: rgba(138,127,122,0.45); text-transform: uppercase;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes rotateSlow { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

  @media (max-width: 480px) {
    .lb-stage { padding: 5rem 2.5rem; }
    .lb-prev { left: 0.2rem; } .lb-next { right: 0.2rem; }
  }

  .lb-center {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background-color: #1a0a0f;
    background-image: url("https://res.cloudinary.com/dqrlv176l/image/upload/w_40,h_40,c_fill,b_black,f_jpg/xv-mariajose/cuadrometalico");
    background-size: 42px 42px;
    background-repeat: repeat;
    background-position: 0 0;
    align-items: center; justify-content: center;
  }
  @keyframes shimmer {
    0%   { background-position: 0 0, 0 0, 0 0, 0 0; }
    100% { background-position: 18px 18px, -18px 18px, 0 18px, 18px 0; }
  }
  .lb-center.active { display: flex; }
  .lb-center-close {
    position: absolute; top: 1.2rem; right: 1.2rem;
    background: none; border: 1px solid rgba(255,255,255,0.2);
    color: white; width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; font-size: 0.9rem; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lb-center-close:hover { background: rgba(255,255,255,0.12); }
  .mosaic {
    position: relative;
    width: min(80vw, 80vh); height: min(80vw, 80vh);
    border-radius: 50%; overflow: hidden;
  }
  .mosaic-piece {
    position: absolute; overflow: hidden; opacity: 0;
    transition: opacity 0.6s ease;
  }
  .mosaic-piece canvas { display: block; }
  .mosaic-piece .roman {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: "Montserrat", sans-serif; font-weight: 300;
    letter-spacing: 0.15em; font-size: clamp(1.1rem, 3.5vw, 2rem);
    color: rgba(232,213,163,0.95);
    text-shadow: 0 0 16px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,0.7);
    pointer-events: none; opacity: 1; transition: opacity 0.7s ease;
  }
  #finalCanvas {
    display: none; position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 0 3px #e8d5a3, 0 0 0 10px rgba(242,196,206,0.25), 0 30px 100px rgba(0,0,0,0.7);
    opacity: 0; transition: opacity 1s ease;
    max-width: min(80vw,80vh); max-height: min(80vw,80vh);
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Cactus Multimedia · 2026</p>
  <h1>María José</h1>
  <p class="subtitle">Mis Quince Años</p>
  <div class="divider"><span></span><span class="divider-diamond">✦</span><span></span></div>
</header>

<section class="clock-section">
  <div class="clock-wrap" id="clockWrap">
    <div class="clock-ring"></div>
    <div class="center-photo" id="centerPhoto" style="cursor:pointer"><img src="https://res.cloudinary.com/dqrlv176l/image/upload/xv-mariajose/mojoprincipal.jpg" alt="María José"></div>
    
  </div>
</section>

<footer><p>Fotografía · Cactus Multimedia · Chiapa de Corzo, Chiapas · © 2026 Todos los derechos reservados</p></footer>

<div class="lightbox" id="lightbox">
  <div class="lb-header">
    <span class="lb-title" id="lbTitle"></span>
    <span class="lb-counter" id="lbCounter"></span>
    <button class="lb-close" id="lbClose">✕</button>
  </div>
  <div class="lb-stage">
    <button class="lb-btn lb-prev" id="lbPrev">‹</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-btn lb-next" id="lbNext">›</button>
  </div>
  <div class="lb-strip" id="lbStrip"></div>
</div>

<script>
const CDN = "https://res.cloudinary.com/dqrlv176l/image/upload/xv-mariajose/";
const C = (carpeta, fotos) => fotos.map(f => CDN + encodeURIComponent(carpeta) + "/" + f.replace(".JPG", ".jpg"));

const paquetes = [
  { nombre:"I",  fotos: C("Nueva carpeta con elementos",    ["DSC_0788.JPG","DSC_0789.JPG","DSC_0792.JPG","DSC_0793.JPG","DSC_0795.JPG","DSC_0797.JPG"]) },
  { nombre:"II",  fotos: C("Nueva carpeta con elementos 2",  ["DSC_0799.JPG","DSC_0800.JPG","DSC_0801.JPG","DSC_0802.JPG","DSC_0803.JPG","DSC_0804.JPG","DSC_0805.JPG","DSC_0806.JPG","DSC_0807.JPG","DSC_0808.JPG","DSC_0809.JPG","DSC_0810.JPG","DSC_0811.JPG","DSC_0812.JPG","DSC_0813.JPG","DSC_0814.JPG","DSC_0815.JPG","DSC_0816.JPG","DSC_0817.JPG","DSC_0818.JPG","DSC_0819.JPG","DSC_0820.JPG"]) },
  { nombre:"III",  fotos: C("Nueva carpeta con elementos 3",  ["DSC_0821.JPG","DSC_0823.JPG","DSC_0825.JPG","DSC_0826.JPG","DSC_0827.JPG","DSC_0828.JPG","DSC_0830.JPG"]) },
  { nombre:"IV",  fotos: C("Nueva carpeta con elementos 4",  ["DSC_0835.JPG","DSC_0837.JPG","DSC_0838.JPG","DSC_0839.JPG","DSC_0840.JPG","DSC_0841.JPG","DSC_0842.JPG","DSC_0843.JPG","DSC_0844.JPG","DSC_0845.JPG","DSC_0846.JPG","DSC_0847.JPG","DSC_0848.JPG","DSC_0849.JPG","DSC_0852.JPG","DSC_0853.JPG","DSC_0855.JPG","DSC_0856.JPG"]) },
  { nombre:"V",  fotos: C("Nueva carpeta con elementos 5",  ["DSC_0858.JPG","DSC_0861.JPG","DSC_0862.JPG","DSC_0863.JPG","DSC_0864.JPG","DSC_0865.JPG","DSC_0866.JPG","DSC_0867.JPG","DSC_0868.JPG","DSC_0872.JPG","DSC_0873.JPG","DSC_0874.JPG","DSC_0875.JPG","DSC_0876.JPG","DSC_0877.JPG","DSC_0878.JPG","DSC_0879.JPG","DSC_0880.JPG","DSC_0881.JPG","DSC_0882.JPG","DSC_0883.JPG","DSC_0884.JPG","DSC_0885.JPG","DSC_0887.JPG","DSC_0888.JPG","DSC_0889.JPG","DSC_0890.JPG","DSC_0891.JPG","DSC_0892.JPG","DSC_0893.JPG"]) },
  { nombre:"VI",  fotos: C("Nueva carpeta con elementos 6",  ["DSC_0894.JPG","DSC_0895.JPG","DSC_0896.JPG","DSC_0900.JPG","DSC_0901.JPG","DSC_0902.JPG","DSC_0903.JPG","DSC_0905.JPG","DSC_0907.JPG"]) },
  { nombre:"VII",  fotos: C("Nueva carpeta con elementos 7",  ["DSC_0908.JPG","DSC_0909.JPG","DSC_0910.JPG","DSC_0911.JPG","DSC_0912.JPG","DSC_0913.JPG","DSC_0915.JPG","DSC_0916.JPG","DSC_0917.JPG","DSC_0918.JPG","DSC_0920.JPG","DSC_0921.JPG","DSC_0922.JPG","DSC_0923.JPG","DSC_0924.JPG","DSC_0925.JPG","DSC_0927.JPG","DSC_0928.JPG","DSC_0929.JPG","DSC_0931.JPG","DSC_0933.JPG","DSC_0934.JPG","DSC_0936.JPG","DSC_0937.JPG","DSC_0938.JPG","DSC_0939.JPG","DSC_0940.JPG","DSC_0941.JPG","DSC_0942.JPG","DSC_0944.JPG","DSC_0945.JPG","DSC_0946.JPG","DSC_0948.JPG","DSC_0949.JPG","DSC_0950.JPG","DSC_0952.JPG","DSC_0953.JPG","DSC_0954.JPG","DSC_0955.JPG","DSC_0956.JPG","DSC_0957.JPG","DSC_0958.JPG","DSC_0959.JPG","DSC_0960.JPG","DSC_0961.JPG","DSC_0962.JPG","DSC_0963.JPG","DSC_0964.JPG","DSC_0965.JPG","DSC_0966.JPG","DSC_0967.JPG","DSC_0970.JPG","DSC_0971.JPG"]) },
  { nombre:"VIII",  fotos: C("Nueva carpeta con elementos 8",  ["DSC_0975.JPG","DSC_0977.JPG","DSC_0978.JPG","DSC_0980.JPG","DSC_0981.JPG","DSC_0982.JPG","DSC_0983.JPG","DSC_0984.JPG","DSC_0985.JPG","DSC_0986.JPG","DSC_0988.JPG","DSC_0989.JPG","DSC_0990.JPG"]) },
  { nombre:"IX",  fotos: C("Nueva carpeta con elementos 9",  ["DSC_1000.JPG","DSC_1001.JPG","DSC_1002.JPG","DSC_1003.JPG","DSC_1004.JPG","DSC_1005.JPG","DSC_1008.JPG","DSC_1009.JPG","DSC_1010.JPG","DSC_1012.JPG","DSC_1015.JPG","DSC_1017.JPG","DSC_1018.JPG","DSC_1020.JPG","DSC_1022.JPG","DSC_1023.JPG"]) },
  { nombre:"X", fotos: C("Nueva carpeta con elementos 10", ["DSC_0991.JPG","DSC_0992.JPG","DSC_0994.JPG","DSC_0995.JPG","DSC_1027.JPG","DSC_1028.JPG","DSC_1029.JPG","DSC_1031.JPG","DSC_1032.JPG","DSC_1033.JPG","DSC_1035.JPG","DSC_1036.JPG","DSC_1037.JPG"]) },
  { nombre:"XI", fotos: C("Nueva carpeta con elementos 11", ["DSC_1039.JPG","DSC_1040.JPG","DSC_1041.JPG","DSC_1044.JPG","DSC_1048.JPG","DSC_1049.JPG","DSC_1050.JPG","DSC_1051.JPG","DSC_1055.JPG"]) },
  { nombre:"XII", fotos: C("Nueva carpeta con elementos 12", ["DSC_1057.JPG","DSC_1060.JPG","DSC_1061.JPG","DSC_1063.JPG","DSC_1064.JPG","DSC_1065.JPG","DSC_1067.JPG","DSC_1068.JPG","DSC_1069.JPG","DSC_1071.JPG","DSC_1072.JPG"]) },
  { nombre:"XIII", fotos: C("Nueva carpeta con elementos 13", ["DSC_1073.JPG","DSC_1074.JPG","DSC_1075.JPG","DSC_1077.JPG","DSC_1078.JPG","DSC_1079.JPG","DSC_1080.JPG","DSC_1081.JPG","DSC_1082.JPG"]) },
  { nombre:"XIV", fotos: C("Nueva carpeta con elementos 14", ["DSC_1083.JPG","DSC_1085.JPG","DSC_1087.JPG","DSC_1088.JPG","DSC_1089.JPG","DSC_1090.JPG","DSC_1091.JPG","DSC_1093.JPG","DSC_1094.JPG","DSC_1095.JPG","DSC_1096.JPG","DSC_1097.JPG","DSC_1098.JPG","DSC_1099.JPG","DSC_1102.JPG","DSC_1103.JPG"]) },
  { nombre:"XV", fotos: C("Nueva carpeta con elementos 15", ["DSC_1104.JPG","DSC_1105.JPG","DSC_1106.JPG","DSC_1107.JPG","DSC_1108.JPG","DSC_1109.JPG","DSC_1111.JPG","DSC_1112.JPG","DSC_1113.JPG","DSC_1114.JPG","DSC_1115.JPG"]) },
];

const wrap = document.getElementById('clockWrap');
paquetes.forEach((pkg, i) => {
  const ang = (i / paquetes.length) * 360 - 90;
  const rad = ang * Math.PI / 180;
  const cx  = 50 + 44 * Math.cos(rad);
  const cy  = 50 + 44 * Math.sin(rad);
  const el  = document.createElement('div');
  el.className = 'thumb';
  el.style.cssText = `left:${cx}%;top:${cy}%;transform:translate(-50%,-50%);animation:fadeIn 0.6s ease forwards ${1.5+i*0.1}s;`;
  el.innerHTML = `<img src="${pkg.fotos[0]}" alt="${pkg.nombre}" onerror="this.parentElement.style.background='linear-gradient(135deg,#f2c4ce,#e8d5a3)'"><span class="thumb-label">${pkg.nombre}</span>`;
  el.addEventListener('click', () => abrirLightbox(i, 0));
  wrap.appendChild(el);
});

let pkgActivo=0, fotoActiva=0;
const lb=document.getElementById('lightbox'), lbImg=document.getElementById('lbImg'),
      lbTitle=document.getElementById('lbTitle'), lbCounter=document.getElementById('lbCounter'),
      lbStrip=document.getElementById('lbStrip');

function abrirLightbox(p,f){ pkgActivo=p; fotoActiva=f; lb.classList.add('active'); document.body.style.overflow='hidden'; renderLb(); }
function cerrarLightbox(){ lb.classList.remove('active'); document.body.style.overflow=''; }

function renderLb(){
  const pkg=paquetes[pkgActivo], fotos=pkg.fotos;
  lbTitle.textContent=pkg.nombre; lbCounter.textContent=`${fotoActiva+1} / ${fotos.length}`;
  lbImg.classList.remove('loaded'); lbImg.onload=()=>lbImg.classList.add('loaded'); lbImg.src=fotos[fotoActiva];
  lbStrip.innerHTML='';
  fotos.forEach((f,i)=>{
    const st=document.createElement('div');
    st.className='strip-thumb'+(i===fotoActiva?' active':'');
    st.innerHTML=`<img src="${f}" alt="">`;
    st.addEventListener('click',()=>{ fotoActiva=i; renderLb(); });
    lbStrip.appendChild(st);
  });
  const a=lbStrip.children[fotoActiva]; if(a) a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function sig(){ fotoActiva=(fotoActiva+1)%paquetes[pkgActivo].fotos.length; renderLb(); }
function ant(){ fotoActiva=(fotoActiva-1+paquetes[pkgActivo].fotos.length)%paquetes[pkgActivo].fotos.length; renderLb(); }

document.getElementById('lbClose').addEventListener('click',cerrarLightbox);
document.getElementById('lbNext').addEventListener('click',sig);
document.getElementById('lbPrev').addEventListener('click',ant);
lb.addEventListener('click',e=>{ if(e.target===lb) cerrarLightbox(); });
document.addEventListener('keydown',e=>{ if(!lb.classList.contains('active')) return; if(e.key==='ArrowRight') sig(); if(e.key==='ArrowLeft') ant(); if(e.key==='Escape') cerrarLightbox(); });
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
lb.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>40) dx<0?sig():ant(); });

<div class="lb-center" id="lbCenter">
  <button class="lb-center-close" id="lbCenterClose">✕</button>
  <div class="mosaic" id="mosaic"></div>
  <canvas id="finalCanvas"></canvas>
</div>
<script>
const romanos = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV"];
const lbCenter = document.getElementById("lbCenter");
const mosaic = document.getElementById("mosaic");
const finalCanvas = document.getElementById("finalCanvas");
function cerrarCenter(){ lbCenter.classList.remove("active"); document.body.style.overflow=""; mosaic.innerHTML=""; mosaic.style.opacity="1"; finalCanvas.style.display="none"; finalCanvas.style.opacity="0"; }
document.getElementById("centerPhoto").addEventListener("click", () => { lbCenter.classList.add("active"); document.body.style.overflow="hidden"; iniciarReveal(); });
document.getElementById("lbCenterClose").addEventListener("click", cerrarCenter);
lbCenter.addEventListener("click", e => { if(e.target===lbCenter) cerrarCenter(); });
document.addEventListener("keydown", e => { if(lbCenter.classList.contains("active")&&e.key==="Escape") cerrarCenter(); });
function iniciarReveal(){ mosaic.innerHTML=""; finalCanvas.style.display="none"; finalCanvas.style.opacity="0"; const img=new Image(); img.crossOrigin="anonymous"; img.src="https://res.cloudinary.com/dqrlv176l/image/upload/xv-mariajose/mojoprincipal.jpg"; img.onload=()=>construirMosaico(img); }
function construirMosaico(img){ const SIZE=mosaic.offsetWidth; const COLS=5,ROWS=3,total=COLS*ROWS; const pw=SIZE/COLS,ph=SIZE/ROWS; const scale=Math.max(SIZE/img.width,SIZE/img.height); const sw=img.width*scale,sh=img.height*scale; const ox=(sw-SIZE)/2,oy=(sh-SIZE)/2; const piezas=[]; for(let r=0;r<ROWS;r++){ for(let c=0;c<COLS;c++){ const idx=r*COLS+c; const wrap=document.createElement("div"); wrap.className="mosaic-piece"; wrap.style.cssText="left:"+c*pw+"px;top:"+r*ph+"px;width:"+pw+"px;height:"+ph+"px;"; const cv=document.createElement("canvas"); cv.width=pw; cv.height=ph; const ctx=cv.getContext("2d"); ctx.drawImage(img,-(c*pw+ox/(sw/SIZE)),-(r*ph+oy/(sh/SIZE)),sw,sh); ctx.fillStyle="rgba(20,10,10,0.55)"; ctx.fillRect(0,0,pw,ph); const label=document.createElement("div"); label.className="roman"; label.textContent=romanos[idx]; wrap.appendChild(cv); wrap.appendChild(label); mosaic.appendChild(wrap); piezas.push({wrap,label,ctx,img,ox,oy,sw,sh,pw,ph,c,r}); } } piezas.forEach(({wrap,label,ctx,img,ox,oy,sw,sh,pw,ph,c,r},i)=>{ setTimeout(()=>{ wrap.style.opacity="1"; setTimeout(()=>{ ctx.clearRect(0,0,pw,ph); ctx.drawImage(img,-(c*pw+ox/(sw/SIZE)),-(r*ph+oy/(sh/SIZE)),sw,sh); setTimeout(()=>{ label.style.opacity="0"; },400); },900); },i*500); }); setTimeout(()=>mostrarFinal(img,SIZE,ox,oy,sw,sh),total*500+1400); }
function mostrarFinal(img,SIZE,ox,oy,sw,sh){ finalCanvas.width=SIZE; finalCanvas.height=SIZE; const ctx=finalCanvas.getContext("2d"); ctx.drawImage(img,-ox/(sw/SIZE),-oy/(sh/SIZE),sw,sh); finalCanvas.style.display="block"; requestAnimationFrame(()=>requestAnimationFrame(()=>{ finalCanvas.style.opacity="1"; setTimeout(()=>{ mosaic.style.opacity="0"; },600); })); }
</script>
</body>
</html>
